  <style>
    :root {
      --primary: #f97316;
      --bg: #ffffff;
    }
    body { background: var(--bg); margin: 0; padding: 0; }
    #root-preloader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99999;
      font-family: 'Poppins', sans-serif;
    }
    .loader-container { position: relative; width: 120px; height: 120px; }
    .loader-circle {
      position: absolute; width: 100%; height: 100%;
      border: 3px solid rgba(249, 115, 22, 0.1);
      border-top: 3px solid var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    .plane-icon {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: var(--primary); font-size: 40px;
      animation: plane-fly 2s ease-in-out infinite;
    }
    .loading-text {
      margin-top: 24px; font-weight: 700; color: #1e293b;
      letter-spacing: 2px; text-transform: uppercase; font-size: 14px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes plane-fly {
      0%, 100% { transform: translate(-50%, -50%) rotate(0deg) scale(1); }
      50% { transform: translate(-50%, -50%) rotate(15deg) scale(1.1); }
    }
    @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
  </style>
